# ─────────────────────────────────────────────────────────────────
# PAMS — Paragon Apartment Management System
# docker-compose.yml
#
# Services:
#   pams-app  — The main PyQt5 desktop application
#   pams-seed — One-shot seeder (run once to populate mock data)
#   pams-test — Runs pytest suite (CI/CD)
# ─────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Main Application ──────────────────────────────────────────
  pams-app:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pams-app
    image: pams:latest
    environment:
      - PAMS_DB_PATH=/app/data/pams.db
      - PYTHONPATH=/app
      # GUI display forwarding (Linux host only)
      # On Windows use VcXsrv; on Mac use XQuartz
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      # Persist the SQLite database file between runs
      - pams-data:/app/data
      # Live-reload source during development (remove for production)
      - .:/app
    working_dir: /app
    command: python main.py
    # For GUI on Linux — share X11 socket
    # Uncomment if running on Linux with a display:
    # network_mode: host
    # volumes (add to above):
    #   - /tmp/.X11-unix:/tmp/.X11-unix:rw
    restart: unless-stopped

  # ── Database Seeder (run once) ────────────────────────────────
  pams-seed:
    platform: linux/amd64
    image: pams:latest
    container_name: pams-seed
    depends_on:
      - pams-app
    environment:
      - PAMS_DB_PATH=/app/data/pams.db
      - PYTHONPATH=/app
    volumes:
      - pams-data:/app/data
      - .:/app
    command: python database/seed.py
    # This service exits after seeding — that's intentional
    restart: "no"

  # ── Test Runner ───────────────────────────────────────────────
  pams-test:
    platform: linux/amd64
    image: pams:latest
    container_name: pams-test
    environment:
      # Use a separate in-memory DB for tests so they don't touch real data
      - "PAMS_DB_PATH=:memory:"
      - PYTHONPATH=/app
    volumes:
      - .:/app
    command: >
      sh -c "python -m pytest tests/ -v --cov=. --cov-report=term-missing"
    restart: "no"

# ── Named Volumes ─────────────────────────────────────────────────
volumes:
  pams-data:
    driver: local
    # This volume stores pams.db between container restarts
    # To reset the database: docker volume rm pams_pams-data